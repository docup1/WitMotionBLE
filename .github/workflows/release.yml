name: Build and Release WT9011 BLE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore WT9011BleLib.sln

      - name: Build WT9011BleLib
        run: dotnet build WT9011BleLib/WT9011BleLib.csproj -c Release --no-restore -o output/WT9011BleLib

      - name: Publish WT9011TestApp (self-contained)
        run: dotnet publish WT9011TestApp/WT9011TestApp.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish/${{ matrix.rid }}

      - name: Make test app executable (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x publish/${{ matrix.rid }}/WT9011TestApp

      - name: Upload test app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}-artifacts
          path: publish/${{ matrix.rid }}

      - name: Upload library DLL artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: WT9011BleLib-dll
          path: output/WT9011BleLib/WT9011BleLib.dll

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Zip each test app build
        run: |
          mkdir release
          for dir in ./artifacts/*-artifacts; do
            name=$(basename "$dir")
            zip -r "release/${name}.zip" "$dir"
          done

      - name: Copy DLL from WT9011BleLib-dll
        run: |
          cp artifacts/WT9011BleLib-dll/WT9011BleLib.dll release/

      - name: Create GitHub Release with test apps + DLL
        uses: softprops/action-gh-release@v2
        with:
          name: WT9011 BLE Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            release/*.zip
            release/WT9011BleLib.dll
          token: ${{ secrets.GH_PAT }}

