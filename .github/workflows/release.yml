name: Build and Release WT9011 BLE Library

on:
  push:
    tags:
      - 'v*'  # Запуск при пуше тега v1.0.0, v1.1.0 и т.д.

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore WT9011BleLib.sln

      - name: Build WT9011BleLib
        run: dotnet build WT9011BleLib/WT9011BleLib.csproj -c Release --no-restore

      - name: Publish WT9011TestApp
        run: dotnet publish WT9011TestApp/WT9011TestApp.csproj -c Release -r ${{ matrix.rid }} --self-contained false -o publish/${{ matrix.rid }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}-artifacts
          path: publish/${{ matrix.rid }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Zip artifacts
        run: |
          mkdir release
          for dir in ./artifacts/*; do
            name=$(basename "$dir")
            zip -r "release/${name}.zip" "$dir"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WT9011 BLE ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: release/*.zip
          token: ${{ secrets.GH_PAT }}  # ⬅️ Убедись, что токен добавлен

