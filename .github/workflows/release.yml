name: Build and Release WT9011 BLE Library

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore WT9011BleLib.sln

      - name: Build WT9011BleLib
        run: dotnet build WT9011BleLib/WT9011BleLib.csproj -c Release --no-restore

      - name: Publish Test App
        run: dotnet publish WT9011TestApp/WT9011TestApp.csproj -c Release -r ${{ matrix.rid }} --self-contained false -o publish/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}-artifacts
          path: publish/${{ matrix.rid }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create release archive
        run: |
          mkdir release
          for d in ./artifacts/*; do
            name=$(basename "$d")
            zip -r release/$name.zip $d
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WT9011 BLE Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

