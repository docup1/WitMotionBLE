name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libbluetooth-dev bluez

      - name: Install Qt 6.5.3
        uses: jurplel/install-qt-action@v2
        with:
          version: '6.5.3'
          host: 'linux'
          target: 'desktop'
          modules: 'qtbase qtdeclarative qtbluetooth'
          install-deps: true

      - name: Set Qt paths
        run: |
          echo "Qt6_DIR=$HOME/Qt/6.5.3/gcc_64" >> $GITHUB_ENV
          echo "PATH=$HOME/Qt/6.5.3/gcc_64/bin:$PATH" >> $GITHUB_ENV

      - name: Verify Qt installation
        run: |
          echo "Qt6_DIR: $Qt6_DIR"
          ls -l $Qt6_DIR/lib/cmake/Qt6Bluetooth || (echo "❌ Qt6Bluetooth not found" && exit 1)
          ls -l $Qt6_DIR/lib/cmake/Qt6Bluetooth/Qt6BluetoothConfig.cmake || (echo "❌ Qt6BluetoothConfig.cmake not found" && exit 1)

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_PREFIX_PATH="$Qt6_DIR"

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wt9011_ble
          path: build/wt9011_ble

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: wt9011_ble
          path: ./release
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
      - name: Upload binary to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release/wt9011_ble
          asset_name: wt9011_ble
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
