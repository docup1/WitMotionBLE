name: Build and Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qt 6 with Bluetooth module
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          host: 'linux'
          target: 'desktop'
          modules: 'qtconnectivity qtbase'
          setup-python: false
          
      - name: Install additional dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake
          
      - name: Verify Qt Bluetooth installation
        run: |
          echo "Qt installation directory: $Qt6_DIR"
          echo "CMAKE_PREFIX_PATH: $CMAKE_PREFIX_PATH"
          ls -la $Qt6_DIR/../.. || true
          find $Qt6_DIR -name "*Bluetooth*" || true
          
      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH
            
      - name: Build
        run: cmake --build build --config Release
        
      - name: Create release directory
        run: |
          mkdir -p release
          cp build/wt9011_ble release/
          chmod +x release/wt9011_ble
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wt9011_ble-linux
          path: release/wt9011_ble
          
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: wt9011_ble-linux
          path: ./release
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./release/wt9011_ble
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}