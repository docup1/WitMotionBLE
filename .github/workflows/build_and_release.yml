name: Build and Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: Install aqt
        run: pip install aqtinstall
        
      - name: List available Qt modules
        run: aqt list-qt linux desktop --modules 6.5.0
        
      - name: Install Qt 6 with Bluetooth
        run: |
          aqt install-qt linux desktop 6.5.0 --outputdir $HOME/Qt --modules qtconnectivity
          echo "Qt6_DIR=$HOME/Qt/6.5.0/gcc_64/lib/cmake/Qt6" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$HOME/Qt/6.5.0/gcc_64/lib/cmake" >> $GITHUB_ENV
          
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake
          
      - name: Verify Qt installation
        run: |
          echo "Qt6_DIR: $Qt6_DIR"
          echo "CMAKE_PREFIX_PATH: $CMAKE_PREFIX_PATH"
          ls -la $HOME/Qt/6.5.0/gcc_64/lib/cmake/Qt6* || true
          
      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH
            
      - name: Build
        run: cmake --build build --config Release
        
      - name: Prepare release
        run: |
          mkdir -p release
          cp build/wt9011_ble release/
          chmod +x release/wt9011_ble
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wt9011_ble-linux
          path: release/wt9011_ble
          
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: wt9011_ble-linux
          path: ./release
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./release/wt9011_ble
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}