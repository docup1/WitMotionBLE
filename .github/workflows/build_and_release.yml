name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libbluetooth-dev bluez qt6-base-dev qt6-tools-dev-tools qt6-multimedia-dev

      - name: Install Qt with Bluetooth
        run: |
          sudo apt-get install -y qt6-bluetooth-dev
          echo "Qt6_DIR=/usr/lib/x86_64-linux-gnu/cmake/Qt6" >> $GITHUB_ENV

      - name: Verify Qt installation
        run: |
          echo "Qt6_DIR: $Qt6_DIR"
          ls -l $Qt6_DIR
          ls -l $Qt6_DIR/Qt6Bluetooth

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_PREFIX_PATH="$Qt6_DIR"

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wt9011_ble
          path: build/wt9011_ble

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: wt9011_ble
          path: ./release
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
      - name: Upload binary to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release/wt9011_ble
          asset_name: wt9011_ble
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}