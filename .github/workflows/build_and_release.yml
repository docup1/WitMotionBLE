name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libbluetooth-dev bluez

      - name: Install Qt 6 with Bluetooth module
        uses: jurplel/install-qt-action@v2
        with:
          version: '6.5.0'
          host: 'linux'
          target: 'desktop'
          modules: 'qtbluetooth'  # Убедимся, что имя модуля правильное
          install-deps: true      # Установить системные зависимости

      - name: Verify Qt installation
        run: |
          echo "Qt6_DIR: $Qt6_DIR"
          ls -lR $Qt6_DIR/lib/cmake || true
          find $Qt6_DIR -name "Qt6*" -type d | grep Bluetooth || true

      - name: Configure CMake
        run: |
          # Проверяем существование файла конфигурации
          if [ -f "$Qt6_DIR/lib/cmake/Qt6Bluetooth/Qt6BluetoothConfig.cmake" ]; then
            cmake -S . -B build -DCMAKE_PREFIX_PATH="$Qt6_DIR"
          else
            echo "Qt6BluetoothConfig.cmake not found! Available modules:"
            ls $Qt6_DIR/lib/cmake
            exit 1
          fi

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wt9011_ble
          path: build/wt9011_ble

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: wt9011_ble
          path: ./release
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
      - name: Upload binary to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release/wt9011_ble
          asset_name: wt9011_ble
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}